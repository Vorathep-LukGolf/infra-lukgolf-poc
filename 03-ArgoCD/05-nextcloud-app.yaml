apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vorathep-LukGolf/infra-lukgolf-poc.git
    targetRevision: main
    path: kubernetes/nextcloud
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=trueS