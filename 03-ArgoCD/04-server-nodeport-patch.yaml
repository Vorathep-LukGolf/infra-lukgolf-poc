apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
spec:
  type: NodePort
  ports:
    - name: https
      port: 443
      targetPort: 8080   # ✅ ArgoCD container ใช้ 8080 (HTTP) ถ้า insecure=true
      nodePort: 32080
  selector:
    app.kubernetes.io/name: argocd-server